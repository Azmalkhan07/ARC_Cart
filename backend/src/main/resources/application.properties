spring.application.name=arccart-backend

# ── Database (Railway MySQL) ───────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/arccart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Connection Pool (HikariCP) ─────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true

# ── File Upload ────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ── Logging ─────────────────────────────────────────────────────────────────────
logging.level.com.arccart=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# ── Actuator (Health Check for Railway) ───────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Email / SMTP (Gmail Dev) ───────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App Config ─────────────────────────────────────────────────────────────────
app.name=ARC CART
app.version=1.0.0
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ── JWT ────────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:ArcCartSuperSecureJwtSecretKey2024@ForProductionUse}
app.jwt.expiration=604800000

# ── Thymeleaf ──────────────────────────────────────────────────────────────────
spring.thymeleaf.check-template-location=false
